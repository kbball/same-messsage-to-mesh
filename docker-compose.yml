services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  # meshcore-mqtt bridges a MeshCore node to the local Mosquitto broker.
  # Only starts when --profile meshcore is passed (or COMPOSE_PROFILES=meshcore).
  # Set MESHCORE_ADDRESS and MESHCORE_PORT in .env to point at your MeshCore node.
  meshcore-mqtt:
    image: ghcr.io/kbball/meshcore-mqtt:main
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MESHCORE_CONNECTION: tcp
    depends_on:
      - mosquitto
    profiles:
      - meshcore

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      MQTT_HOST: mosquitto
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    # Pass the RTL-SDR USB device through to the container.
    # Adjust the path if your device appears at a different location.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:
