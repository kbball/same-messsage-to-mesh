name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0)'
        required: true

jobs:
  release:
    name: Lint, test, tag, push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: same_mesh_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint backend
        run: cd backend && golangci-lint run ./...
      - name: Test backend
        run: cd backend && go test ./...
        env:
          DB_TEST_DSN: host=localhost port=5432 dbname=same_mesh_test user=postgres password=postgres sslmode=disable
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Lint frontend
        run: cd frontend && npm run lint
      - name: Test frontend
        run: cd frontend && npm test
      - name: Create git tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push versioned + :latest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kbball/same-message-to-mesh:v${{ github.event.inputs.version }}
            ghcr.io/kbball/same-message-to-mesh:latest
